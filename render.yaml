services:
  - type: web
    runtime: static
    name: emerald-hands
    staticPublishPath: "."
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    headers:
      - path: "/*"
        name: X-Frame-Options
        value: DENY
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
      - path: "/assets/*"
        name: Cache-Control
        value: public, max-age=31536000, immutable
    previews:
      generation: automatic
